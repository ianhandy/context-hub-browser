<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Context Hub Browser — Explore Andrew Ng's API Documentation Registry</title>
<meta name="description" content="Browse and search 1,500+ API documentation collections from Andrew Ng's context-hub. Beautiful visual discovery for coding agents.">
<meta property="og:title" content="Context Hub Browser">
<meta property="og:description" content="Browse 1,500+ curated API docs for coding agents">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1A0D00;--bg2:#241200;--bg3:#2E1800;--bg4:#3A2000;
  --gold:#DDC165;--gold-light:#FFE9A3;--gold-dim:#8B7A3A;
  --orange:#E5591C;--orange-glow:#FF6B2E;
  --text:#E8DCC8;--text-dim:#9A8B70;--text-bright:#FFF8E8;
  --border:#3A2A15;--border-light:#5A4020;
  --card-bg:rgba(36,18,0,0.6);
  --radius:12px;--radius-sm:8px;
  --transition:0.25s cubic-bezier(0.4,0,0.2,1);
}
html{font-size:16px;scroll-behavior:smooth}
body{
  background:var(--bg);color:var(--text);
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  line-height:1.6;min-height:100vh;overflow-x:hidden;
}

/* Ambient background */
body::before{
  content:'';position:fixed;inset:0;z-index:-2;
  background:
    radial-gradient(ellipse 100% 60% at 15% -10%,rgba(221,193,101,0.06) 0%,transparent 55%),
    radial-gradient(ellipse 80% 50% at 85% 110%,rgba(229,89,28,0.04) 0%,transparent 55%),
    radial-gradient(circle at 50% 50%,rgba(26,13,0,1) 0%,rgba(26,13,0,1) 100%);
}
body::after{
  content:'';position:fixed;inset:0;z-index:-1;
  background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23DDC165' fill-opacity='0.015'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  opacity:0.5;
}

/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--gold-dim)}

/* Header */
.header{
  padding:2.5rem 2rem 1.5rem;text-align:center;
  border-bottom:1px solid var(--border);
  background:linear-gradient(180deg,rgba(36,18,0,0.95) 0%,rgba(26,13,0,0.9) 100%);
  position:sticky;top:0;z-index:100;backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
}
.header::after{
  content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold-dim),var(--orange),var(--gold-dim),transparent);
  opacity:0.4;
}
.logo-row{
  display:flex;align-items:center;justify-content:center;gap:0.6rem;
  margin-bottom:0.3rem;
}
.logo-icon{
  width:32px;height:32px;
  background:linear-gradient(135deg,var(--gold),var(--orange));
  border-radius:8px;display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;box-shadow:0 2px 12px rgba(229,89,28,0.3);
}
.header h1{
  font-size:1.6rem;font-weight:700;letter-spacing:-0.03em;
  background:linear-gradient(135deg,var(--gold-light) 0%,var(--gold) 40%,var(--orange) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.subtitle{
  font-size:0.8rem;color:var(--text-dim);font-weight:400;
  margin-bottom:1.25rem;
}
.subtitle a{color:var(--gold-dim);text-decoration:none;transition:color var(--transition)}
.subtitle a:hover{color:var(--gold)}

/* Search */
.search-wrap{max-width:560px;margin:0 auto;position:relative}
.search-wrap input{
  width:100%;padding:0.7rem 2.5rem 0.7rem 2.6rem;
  background:rgba(36,18,0,0.8);border:1px solid var(--border);
  border-radius:10px;color:var(--text-bright);
  font-size:0.9rem;outline:none;transition:all var(--transition);
  font-family:inherit;
}
.search-wrap input:focus{
  border-color:var(--gold-dim);
  box-shadow:0 0 0 3px rgba(221,193,101,0.08),0 4px 16px rgba(0,0,0,0.2);
  background:rgba(36,18,0,0.95);
}
.search-wrap input::placeholder{color:var(--text-dim);font-size:0.85rem}
.search-icon{
  position:absolute;left:0.85rem;top:50%;transform:translateY(-50%);
  color:var(--text-dim);pointer-events:none;opacity:0.6;
}
.clear-btn{
  position:absolute;right:0.7rem;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--text-dim);cursor:pointer;
  font-size:1.1rem;display:none;padding:0.25rem;line-height:1;
}
.clear-btn.visible{display:block}
.clear-btn:hover{color:var(--gold)}
.kbd-hint{
  position:absolute;right:0.7rem;top:50%;transform:translateY(-50%);
  font-size:0.65rem;color:var(--text-dim);opacity:0.4;
  border:1px solid var(--border);padding:0.1rem 0.35rem;border-radius:4px;
  font-family:monospace;pointer-events:none;
}
.search-wrap input:focus ~ .kbd-hint,
.clear-btn.visible ~ .kbd-hint{display:none}

/* Stats bar */
.stats-bar{
  display:flex;gap:0.25rem;justify-content:center;align-items:center;
  padding:0.6rem 2rem;border-bottom:1px solid var(--border);
  font-size:0.75rem;color:var(--text-dim);flex-wrap:wrap;
  background:rgba(26,13,0,0.5);
}
.stat-pill{
  display:flex;align-items:center;gap:0.3rem;
  padding:0.2rem 0.6rem;border-radius:20px;
  background:rgba(36,18,0,0.5);
}
.stat-pill .num{
  color:var(--gold);font-weight:600;
  font-variant-numeric:tabular-nums;
}
.stat-sep{color:var(--border);margin:0 0.15rem}

/* Filters */
.filters{
  display:flex;gap:0.4rem;padding:0.6rem 2rem;
  border-bottom:1px solid var(--border);
  overflow-x:auto;flex-wrap:nowrap;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.filters::-webkit-scrollbar{display:none}
.filter-btn{
  padding:0.3rem 0.75rem;border-radius:20px;
  background:transparent;border:1px solid var(--border);
  color:var(--text-dim);font-size:0.72rem;cursor:pointer;
  white-space:nowrap;transition:all var(--transition);flex-shrink:0;
  font-family:inherit;
}
.filter-btn:hover{border-color:var(--border-light);color:var(--text)}
.filter-btn.active{
  background:linear-gradient(135deg,rgba(221,193,101,0.12),rgba(229,89,28,0.08));
  border-color:rgba(221,193,101,0.3);color:var(--gold);
  box-shadow:0 0 8px rgba(221,193,101,0.05);
}

/* Controls bar */
.controls{
  display:flex;align-items:center;gap:0.75rem;
  padding:0.5rem 2rem;border-bottom:1px solid var(--border);
  justify-content:space-between;background:rgba(26,13,0,0.3);
}
.controls-left{display:flex;align-items:center;gap:0.6rem}
.sort-select{
  background:transparent;border:1px solid var(--border);
  color:var(--text-dim);padding:0.25rem 0.5rem;border-radius:6px;
  font-size:0.72rem;cursor:pointer;outline:none;font-family:inherit;
}
.sort-select:focus{border-color:var(--gold-dim)}
.sort-select option{background:var(--bg2);color:var(--text)}
.group-toggle{display:flex;border:1px solid var(--border);border-radius:6px;overflow:hidden}
.group-toggle button{
  padding:0.25rem 0.6rem;background:transparent;border:none;
  color:var(--text-dim);font-size:0.7rem;cursor:pointer;
  border-right:1px solid var(--border);transition:all var(--transition);
  font-family:inherit;
}
.group-toggle button:last-child{border-right:none}
.group-toggle button:hover{color:var(--text)}
.group-toggle button.active{background:rgba(221,193,101,0.08);color:var(--gold)}
.result-count{font-size:0.72rem;color:var(--text-dim);font-variant-numeric:tabular-nums}

/* Main */
.main{padding:1.25rem 2rem 5rem;max-width:1440px;margin:0 auto}

/* Category sections */
.category-section{margin-bottom:1.75rem}
.category-header{
  display:flex;align-items:center;gap:0.6rem;
  margin-bottom:0.6rem;padding-bottom:0.4rem;
  border-bottom:1px solid rgba(58,42,21,0.5);
}
.category-header h2{
  font-size:0.9rem;font-weight:600;color:var(--gold);
  letter-spacing:-0.01em;
}
.category-count{
  font-size:0.65rem;color:var(--text-dim);
  background:rgba(46,24,0,0.6);padding:0.1rem 0.45rem;
  border-radius:10px;font-variant-numeric:tabular-nums;
}

/* Card grid */
.card-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:0.6rem;
}

/* Cards */
.card{
  background:var(--card-bg);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:0.85rem 1rem;
  cursor:pointer;transition:all var(--transition);position:relative;
  overflow:hidden;
}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--gold),var(--orange));
  opacity:0;transition:opacity var(--transition);
}
.card:hover{
  border-color:var(--border-light);
  transform:translateY(-2px);
  box-shadow:0 8px 32px rgba(0,0,0,0.3),0 0 0 1px rgba(221,193,101,0.05);
}
.card:hover::before{opacity:1}
.card-name{
  font-size:0.88rem;font-weight:600;color:var(--text-bright);
  margin-bottom:0.2rem;display:flex;align-items:center;gap:0.4rem;
  line-height:1.3;
}
.vendor-badge{
  font-size:0.6rem;color:var(--gold-dim);font-weight:500;
  background:rgba(221,193,101,0.06);padding:0.05rem 0.35rem;
  border-radius:3px;flex-shrink:0;
}
.card-desc{
  font-size:0.75rem;color:var(--text-dim);
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
  overflow:hidden;margin-bottom:0.4rem;line-height:1.5;
}
.card-meta{display:flex;gap:0.35rem;flex-wrap:wrap;align-items:center}
.tag{
  font-size:0.6rem;padding:0.08rem 0.35rem;
  border-radius:3px;font-weight:500;
}
.tag-lang{color:var(--orange);background:rgba(229,89,28,0.1)}
.tag-official{color:#4ade80;background:rgba(74,222,128,0.06)}
.tag-maintainer{color:var(--gold);background:rgba(221,193,101,0.06)}
.tag-community{color:#60a5fa;background:rgba(96,165,250,0.06)}
.tag-skill{color:var(--gold-light);background:rgba(255,233,163,0.06)}

/* Modal */
.modal-overlay{
  position:fixed;inset:0;z-index:1000;
  background:rgba(0,0,0,0.75);backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  display:none;align-items:flex-start;justify-content:center;
  padding:1.5rem;overflow-y:auto;
}
.modal-overlay.open{display:flex}
.modal{
  background:var(--bg2);border:1px solid var(--border-light);
  border-radius:var(--radius);max-width:900px;width:100%;
  margin-top:3vh;position:relative;
  box-shadow:0 24px 80px rgba(0,0,0,0.6),0 0 1px rgba(221,193,101,0.1);
  animation:modalIn 0.25s cubic-bezier(0.4,0,0.2,1);
}
@keyframes modalIn{
  from{opacity:0;transform:translateY(12px) scale(0.98)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
.modal-head{
  display:flex;justify-content:space-between;align-items:flex-start;
  padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);
}
.modal-head h2{
  font-size:1.15rem;font-weight:700;color:var(--text-bright);
  letter-spacing:-0.02em;
}
.modal-vendor{font-size:0.8rem;color:var(--gold-dim);margin-top:0.1rem}
.modal-close{
  background:none;border:none;color:var(--text-dim);
  font-size:1.4rem;cursor:pointer;padding:0.2rem 0.4rem;
  border-radius:4px;line-height:1;transition:all var(--transition);
}
.modal-close:hover{color:var(--text);background:var(--bg3)}
.modal-info{
  padding:0.75rem 1.5rem;display:flex;gap:0.75rem;flex-wrap:wrap;
  border-bottom:1px solid var(--border);font-size:0.78rem;
}
.info-item{display:flex;align-items:center;gap:0.3rem;color:var(--text-dim)}
.info-val{color:var(--text)}
.modal-langs{
  padding:0.6rem 1.5rem;border-bottom:1px solid var(--border);
  display:flex;gap:0.4rem;flex-wrap:wrap;
}
.lang-btn{
  padding:0.25rem 0.65rem;border-radius:6px;
  background:transparent;border:1px solid var(--border);
  color:var(--text-dim);font-size:0.75rem;cursor:pointer;
  transition:all 0.15s;font-family:inherit;
}
.lang-btn:hover{border-color:var(--border-light);color:var(--text)}
.lang-btn.active{
  border-color:var(--orange);color:var(--orange);
  background:rgba(229,89,28,0.08);
}
.modal-content{padding:1.25rem 1.5rem;min-height:200px;max-height:60vh;overflow-y:auto}
.modal-content .loading{
  text-align:center;color:var(--text-dim);padding:3rem;
}
.spinner{
  display:inline-block;width:20px;height:20px;
  border:2px solid var(--border);border-top-color:var(--gold);
  border-radius:50%;animation:spin 0.6s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.modal-actions{
  padding:0.6rem 1.5rem;border-top:1px solid var(--border);
  display:flex;gap:0.4rem;justify-content:flex-end;
}
.btn{
  padding:0.35rem 0.9rem;border-radius:6px;font-size:0.78rem;
  cursor:pointer;transition:all 0.15s;font-family:inherit;
}
.btn-primary{
  background:linear-gradient(135deg,var(--gold-dim),var(--orange));
  border:none;color:#fff;font-weight:600;
}
.btn-primary:hover{filter:brightness(1.15)}
.btn-secondary{
  background:transparent;border:1px solid var(--border);color:var(--text-dim);
}
.btn-secondary:hover{border-color:var(--border-light);color:var(--text)}
.toast{
  position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(8px);
  background:var(--gold);color:var(--bg);font-weight:600;
  padding:0.45rem 1.1rem;border-radius:8px;font-size:0.82rem;
  opacity:0;transition:all 0.3s;pointer-events:none;z-index:2000;
  box-shadow:0 4px 16px rgba(221,193,101,0.3);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Markdown rendering */
.doc-content{color:var(--text);font-size:0.85rem;line-height:1.7}
.doc-content h1{font-size:1.2rem;color:var(--gold-light);margin:1.5rem 0 0.6rem;font-weight:700;border-bottom:1px solid var(--border);padding-bottom:0.4rem}
.doc-content h2{font-size:1.05rem;color:var(--gold);margin:1.2rem 0 0.4rem;font-weight:600}
.doc-content h3{font-size:0.92rem;color:var(--text-bright);margin:1rem 0 0.35rem;font-weight:600}
.doc-content h4,.doc-content h5,.doc-content h6{font-size:0.85rem;color:var(--text-bright);margin:0.75rem 0 0.3rem;font-weight:600}
.doc-content p{margin:0.4rem 0}
.doc-content code{
  background:var(--bg3);color:var(--orange);
  padding:0.12rem 0.35rem;border-radius:3px;font-size:0.8rem;
  font-family:'SF Mono',Monaco,Consolas,monospace;
}
.doc-content pre{
  background:var(--bg);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:0.85rem;
  overflow-x:auto;margin:0.6rem 0;
}
.doc-content pre code{background:none;color:var(--text);padding:0;font-size:0.78rem;line-height:1.6}
.doc-content a{color:var(--gold);text-decoration:none}
.doc-content a:hover{text-decoration:underline}
.doc-content ul,.doc-content ol{padding-left:1.5rem;margin:0.4rem 0}
.doc-content li{margin:0.2rem 0}
.doc-content blockquote{
  border-left:3px solid var(--gold-dim);padding:0.4rem 0.85rem;
  margin:0.6rem 0;color:var(--text-dim);background:rgba(221,193,101,0.02);
  border-radius:0 var(--radius-sm) var(--radius-sm) 0;
}
.doc-content table{width:100%;border-collapse:collapse;margin:0.6rem 0;font-size:0.8rem}
.doc-content th,.doc-content td{padding:0.4rem 0.6rem;border:1px solid var(--border);text-align:left}
.doc-content th{background:var(--bg3);color:var(--gold);font-weight:600}
.doc-content hr{border:none;border-top:1px solid var(--border);margin:0.8rem 0}

/* Loading state */
.loading-state{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;min-height:50vh;gap:1rem;
}
.loading-state .big-spinner{
  width:40px;height:40px;
  border:2px solid var(--border);border-top-color:var(--gold);
  border-radius:50%;animation:spin 0.8s linear infinite;
}
.loading-state p{color:var(--text-dim);font-size:0.85rem}

/* Shimmer cards */
.shimmer-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:0.6rem;
}
.shimmer-card{
  background:var(--card-bg);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:0.85rem 1rem;height:110px;
  overflow:hidden;position:relative;
}
.shimmer-card::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent 30%,rgba(221,193,101,0.03) 50%,transparent 70%);
  animation:shimmer 1.5s infinite;
}
@keyframes shimmer{from{transform:translateX(-100%)}to{transform:translateX(100%)}}
.shimmer-bar{
  background:var(--bg3);border-radius:4px;
}

/* Empty state */
.empty-state{text-align:center;padding:4rem 2rem;color:var(--text-dim)}
.empty-state .empty-icon{font-size:2.5rem;margin-bottom:0.8rem;opacity:0.25;filter:grayscale(0.5)}
.empty-state h3{color:var(--text);margin-bottom:0.3rem;font-size:1rem}
.empty-state p{font-size:0.85rem}

/* Error state */
.error-state{text-align:center;padding:4rem 2rem}
.error-state h3{color:var(--orange);margin-bottom:0.4rem}
.error-state p{color:var(--text-dim);margin-bottom:1rem;font-size:0.85rem}
.error-state button{
  padding:0.45rem 1.25rem;border-radius:var(--radius-sm);
  background:transparent;border:1px solid var(--border);
  color:var(--gold);cursor:pointer;font-size:0.82rem;font-family:inherit;
  transition:all var(--transition);
}
.error-state button:hover{border-color:var(--gold-dim);background:rgba(221,193,101,0.05)}

/* Footer */
.footer{
  text-align:center;padding:2rem;
  border-top:1px solid var(--border);
  font-size:0.72rem;color:var(--text-dim);
}
.footer a{color:var(--gold-dim);text-decoration:none}
.footer a:hover{color:var(--gold)}

/* Responsive */
@media(max-width:768px){
  .header{padding:1.5rem 1rem 1rem}
  .header h1{font-size:1.3rem}
  .main{padding:1rem}
  .filters{padding:0.5rem 1rem}
  .stats-bar{padding:0.4rem 1rem;gap:0.15rem}
  .controls{padding:0.4rem 1rem;flex-wrap:wrap;gap:0.4rem}
  .card-grid,.shimmer-grid{grid-template-columns:1fr}
  .modal{margin-top:0.5rem;border-radius:var(--radius-sm)}
  .modal-content{max-height:50vh}
  .modal-head{padding:1rem}
  .modal-info{padding:0.6rem 1rem}
  .modal-langs{padding:0.5rem 1rem}
  .modal-content{padding:1rem}
  .modal-actions{padding:0.5rem 1rem}
}
@media(max-width:480px){
  .stat-pill{padding:0.15rem 0.4rem;font-size:0.68rem}
  .card{padding:0.7rem 0.85rem}
  .search-wrap input{font-size:0.85rem;padding:0.6rem 2.2rem 0.6rem 2.3rem}
}
</style>
</head>
<body>

<header class="header">
  <div class="logo-row">
    <div class="logo-icon">&#9889;</div>
    <h1>Context Hub Browser</h1>
  </div>
  <p class="subtitle">Browse <a href="https://github.com/andrewyng/context-hub" target="_blank" rel="noopener">Andrew Ng's context-hub</a> — curated API docs for coding agents</p>
  <div class="search-wrap">
    <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="search" placeholder="Search APIs, libraries, frameworks..." autocomplete="off" spellcheck="false">
    <button class="clear-btn" id="clearSearch" aria-label="Clear search">&times;</button>
    <span class="kbd-hint">/</span>
  </div>
</header>

<div class="stats-bar" id="statsBar"></div>
<div class="filters" id="filters"></div>
<div class="controls">
  <div class="controls-left">
    <div class="group-toggle" id="groupToggle">
      <button data-group="vendor" class="active">By vendor</button>
      <button data-group="flat">All</button>
    </div>
    <select class="sort-select" id="sortSelect">
      <option value="name">Sort: A-Z</option>
      <option value="updated">Sort: Recent</option>
      <option value="size">Sort: Size</option>
    </select>
  </div>
  <span class="result-count" id="resultCount"></span>
</div>

<main class="main" id="main">
  <div class="loading-state" id="loadingState">
    <div class="big-spinner"></div>
    <p>Loading registry from context-hub...</p>
  </div>
</main>

<footer class="footer">
  <p>Data from <a href="https://github.com/andrewyng/context-hub" target="_blank" rel="noopener">andrewyng/context-hub</a> &middot; Built by <a href="https://ianhandy.com" target="_blank" rel="noopener">Ian Handy</a></p>
</footer>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <div class="modal-head">
      <div><h2 id="modalTitle"></h2><div class="modal-vendor" id="modalVendor"></div></div>
      <button class="modal-close" id="modalClose" aria-label="Close">&times;</button>
    </div>
    <div class="modal-info" id="modalInfo"></div>
    <div class="modal-langs" id="modalLangs"></div>
    <div class="modal-content" id="modalContent">
      <div class="loading"><div class="spinner"></div><br>Loading documentation...</div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" id="copyCmd">Copy chub command</button>
      <button class="btn btn-primary" id="viewGithub">View on GitHub</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">Copied!</div>

<script>
(function(){
  'use strict';

  const CDN = 'https://cdn.aichub.org/v1';
  const GITHUB_CONTENT = 'https://github.com/andrewyng/context-hub/tree/main/content';

  let registry = null;
  let allDocs = [];
  let allSkills = [];
  let baseUrl = CDN;
  let currentFilter = 'all';
  let currentSort = 'name';
  let currentGroup = 'vendor';
  let currentSearch = '';
  let currentDoc = null;
  let currentLang = null;

  const $ = id => document.getElementById(id);
  const $main = $('main');
  const $search = $('search');
  const $clearSearch = $('clearSearch');
  const $statsBar = $('statsBar');
  const $filters = $('filters');
  const $sortSelect = $('sortSelect');
  const $groupToggle = $('groupToggle');
  const $resultCount = $('resultCount');
  const $modalOverlay = $('modalOverlay');
  const $modalTitle = $('modalTitle');
  const $modalVendor = $('modalVendor');
  const $modalInfo = $('modalInfo');
  const $modalLangs = $('modalLangs');
  const $modalContent = $('modalContent');
  const $modalClose = $('modalClose');
  const $copyCmd = $('copyCmd');
  const $viewGithub = $('viewGithub');
  const $toast = $('toast');

  // --- Fetch & Init ---
  async function loadRegistry() {
    showShimmer();
    try {
      const res = await fetch(CDN + '/registry.json');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      registry = await res.json();
      baseUrl = registry.base_url || CDN;
      allDocs = registry.docs || [];
      allSkills = registry.skills || [];
      init();
    } catch (err) {
      $main.innerHTML =
        '<div class="error-state"><h3>Failed to load registry</h3>' +
        '<p>' + esc(err.message) + '</p>' +
        '<button onclick="location.reload()">Retry</button></div>';
    }
  }

  function showShimmer() {
    let cards = '';
    for (let i = 0; i < 12; i++) {
      cards += '<div class="shimmer-card">' +
        '<div class="shimmer-bar" style="width:60%;height:14px;margin-bottom:8px"></div>' +
        '<div class="shimmer-bar" style="width:90%;height:10px;margin-bottom:6px"></div>' +
        '<div class="shimmer-bar" style="width:40%;height:10px"></div></div>';
    }
    $main.innerHTML = '<div class="shimmer-grid">' + cards + '</div>';
  }

  function init() {
    renderStats();
    renderFilters();
    renderCards();
    setupEvents();
  }

  // --- Data helpers ---
  function getVendors() {
    const s = new Set();
    allDocs.forEach(d => s.add(d.id.split('/')[0]));
    return [...s].sort();
  }

  function getTopTags(n) {
    const c = {};
    allDocs.forEach(d => (d.tags || []).forEach(t => { c[t] = (c[t]||0)+1; }));
    return Object.entries(c).sort((a,b) => b[1]-a[1]).slice(0, n).map(e => e[0]);
  }

  function getLatestDate(doc) {
    let latest = '';
    (doc.languages || []).forEach(l =>
      (l.versions || []).forEach(v => {
        if (v.lastUpdated && v.lastUpdated > latest) latest = v.lastUpdated;
      })
    );
    return latest || '0000-00-00';
  }

  function getTotalSize(doc) {
    let t = 0;
    (doc.languages || []).forEach(l =>
      (l.versions || []).forEach(v => { t += v.size || 0; })
    );
    return t;
  }

  function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1048576) return (bytes/1024).toFixed(1) + ' KB';
    return (bytes/1048576).toFixed(1) + ' MB';
  }

  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  // --- Render ---
  function renderStats() {
    const vendors = getVendors();
    const langs = new Set();
    allDocs.forEach(d => (d.languages||[]).forEach(l => langs.add(l.language)));
    $statsBar.innerHTML =
      '<span class="stat-pill"><span class="num">' + allDocs.length.toLocaleString() + '</span> docs</span>' +
      '<span class="stat-sep">&middot;</span>' +
      '<span class="stat-pill"><span class="num">' + allSkills.length + '</span> skills</span>' +
      '<span class="stat-sep">&middot;</span>' +
      '<span class="stat-pill"><span class="num">' + vendors.length + '</span> vendors</span>' +
      '<span class="stat-sep">&middot;</span>' +
      '<span class="stat-pill"><span class="num">' + langs.size + '</span> languages</span>';
  }

  function renderFilters() {
    const tags = getTopTags(18);
    let h = '<button class="filter-btn active" data-filter="all">All</button>';
    if (allSkills.length > 0) {
      h += '<button class="filter-btn" data-filter="__skills__">Skills</button>';
    }
    tags.forEach(t => {
      h += '<button class="filter-btn" data-filter="' + esc(t) + '">' + esc(t) + '</button>';
    });
    $filters.innerHTML = h;
  }

  function getFiltered() {
    let docs = currentFilter === '__skills__' ? [] : [...allDocs];
    let skills = currentFilter === '__skills__' ? [...allSkills] : [];

    if (currentFilter !== 'all' && currentFilter !== '__skills__') {
      docs = docs.filter(d => (d.tags||[]).includes(currentFilter));
    }

    if (currentSearch) {
      const q = currentSearch.toLowerCase();
      const words = q.split(/\s+/).filter(Boolean);
      docs = docs.filter(d => {
        const blob = (d.id + ' ' + d.name + ' ' + (d.description||'') + ' ' + (d.tags||[]).join(' ')).toLowerCase();
        return words.every(w => blob.includes(w));
      });
      skills = skills.filter(s => {
        const blob = (s.id + ' ' + s.name + ' ' + (s.description||'')).toLowerCase();
        return words.every(w => blob.includes(w));
      });
    }

    const sortFn = currentSort === 'updated'
      ? (a,b) => getLatestDate(b).localeCompare(getLatestDate(a))
      : currentSort === 'size'
      ? (a,b) => getTotalSize(b) - getTotalSize(a)
      : (a,b) => a.id.localeCompare(b.id);
    docs.sort(sortFn);

    return { docs, skills };
  }

  function renderCards() {
    const { docs, skills } = getFiltered();
    const total = docs.length + skills.length;
    $resultCount.textContent = total.toLocaleString() + ' result' + (total !== 1 ? 's' : '');

    if (total === 0) {
      $main.innerHTML =
        '<div class="empty-state">' +
        '<div class="empty-icon">&#128270;</div>' +
        '<h3>No results found</h3>' +
        '<p>Try a different search term or filter</p></div>';
      return;
    }

    let h = '';

    if (skills.length > 0) {
      h += '<div class="category-section"><div class="category-header">' +
        '<h2>Skills</h2><span class="category-count">' + skills.length + '</span></div>' +
        '<div class="card-grid">' + skills.map(skillCard).join('') + '</div></div>';
    }

    if (currentGroup === 'vendor' && docs.length > 0) {
      const groups = {};
      docs.forEach(d => {
        const v = d.id.split('/')[0];
        (groups[v] = groups[v] || []).push(d);
      });
      Object.keys(groups).sort().forEach(vendor => {
        const items = groups[vendor];
        h += '<div class="category-section"><div class="category-header">' +
          '<h2>' + esc(vendor) + '</h2><span class="category-count">' + items.length + '</span></div>' +
          '<div class="card-grid">' + items.map(docCard).join('') + '</div></div>';
      });
    } else if (docs.length > 0) {
      h += '<div class="card-grid">' + docs.map(docCard).join('') + '</div>';
    }

    $main.innerHTML = h;
  }

  function docCard(doc) {
    const vendor = doc.id.split('/')[0];
    const name = doc.name || doc.id.split('/').pop();
    const langs = (doc.languages || []).map(l => l.language);
    const desc = doc.description || 'API documentation';
    const src = doc.source || 'community';
    return '<div class="card" data-doc-id="' + esc(doc.id) + '">' +
      '<div class="card-name">' + esc(name) + '<span class="vendor-badge">' + esc(vendor) + '</span></div>' +
      '<div class="card-desc">' + esc(desc) + '</div>' +
      '<div class="card-meta">' +
        langs.map(l => '<span class="tag tag-lang">' + esc(l) + '</span>').join('') +
        '<span class="tag tag-' + esc(src) + '">' + esc(src) + '</span>' +
      '</div></div>';
  }

  function skillCard(skill) {
    const vendor = skill.id.split('/')[0];
    const name = skill.name || skill.id;
    const desc = skill.description || 'Skill';
    const src = skill.source || 'community';
    return '<div class="card" data-skill-id="' + esc(skill.id) + '">' +
      '<div class="card-name">' + esc(name) + '<span class="vendor-badge">' + esc(vendor) + '</span></div>' +
      '<div class="card-desc">' + esc(desc) + '</div>' +
      '<div class="card-meta">' +
        '<span class="tag tag-skill">skill</span>' +
        '<span class="tag tag-' + esc(src) + '">' + esc(src) + '</span>' +
      '</div></div>';
  }

  // --- Modal ---
  function openDocModal(docId) {
    const doc = allDocs.find(d => d.id === docId);
    if (!doc) return;
    currentDoc = doc;

    const vendor = doc.id.split('/')[0];
    $modalTitle.textContent = doc.name || doc.id;
    $modalVendor.textContent = vendor;

    $modalInfo.innerHTML =
      '<div class="info-item">Source: <span class="info-val">' + esc(doc.source||'community') + '</span></div>' +
      '<div class="info-item">Tags: <span class="info-val">' + (doc.tags||[]).map(esc).join(', ') + '</span></div>';

    const langs = doc.languages || [];
    if (langs.length > 0) {
      $modalLangs.innerHTML = langs.map((l,i) =>
        '<button class="lang-btn' + (i===0?' active':'') + '" data-lang="' + i + '">' +
        esc(l.language) + ' (v' + esc(l.recommendedVersion || l.versions[0]?.version || '?') + ')</button>'
      ).join('');
      $modalLangs.style.display = '';
      currentLang = 0;
      loadDocContent(doc, 0);
    } else {
      $modalLangs.style.display = 'none';
      $modalContent.innerHTML = '<p style="color:var(--text-dim)">No documentation content available.</p>';
    }

    $copyCmd.onclick = () => {
      navigator.clipboard.writeText('chub add ' + doc.id).then(() => showToast('Copied: chub add ' + doc.id));
    };
    $viewGithub.onclick = () => window.open(GITHUB_CONTENT + '/' + vendor, '_blank');

    $modalOverlay.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function openSkillModal(skillId) {
    const skill = allSkills.find(s => s.id === skillId);
    if (!skill) return;
    currentDoc = skill;

    const vendor = skill.id.split('/')[0];
    $modalTitle.textContent = (skill.name || skill.id) + ' (Skill)';
    $modalVendor.textContent = vendor;

    $modalInfo.innerHTML =
      '<div class="info-item">Source: <span class="info-val">' + esc(skill.source||'community') + '</span></div>' +
      '<div class="info-item">Size: <span class="info-val">' + formatSize(skill.size||0) + '</span></div>' +
      '<div class="info-item">Updated: <span class="info-val">' + esc(skill.lastUpdated||'unknown') + '</span></div>';
    $modalLangs.style.display = 'none';

    loadMdContent(baseUrl + '/' + skill.path + '/SKILL.md');

    $copyCmd.onclick = () => {
      navigator.clipboard.writeText('chub add ' + skill.id).then(() => showToast('Copied: chub add ' + skill.id));
    };
    $viewGithub.onclick = () => window.open(GITHUB_CONTENT + '/' + vendor, '_blank');

    $modalOverlay.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  async function loadDocContent(doc, langIdx) {
    const lang = doc.languages[langIdx];
    if (!lang) return;
    const ver = lang.versions.find(v => v.version === lang.recommendedVersion) || lang.versions[0];
    if (!ver) return;

    $modalContent.innerHTML = '<div class="loading"><div class="spinner"></div><br>Loading documentation...</div>';

    $modalInfo.innerHTML =
      '<div class="info-item">Source: <span class="info-val">' + esc(doc.source||'community') + '</span></div>' +
      '<div class="info-item">Version: <span class="info-val">' + esc(ver.version) + '</span></div>' +
      '<div class="info-item">Size: <span class="info-val">' + formatSize(ver.size||0) + '</span></div>' +
      '<div class="info-item">Updated: <span class="info-val">' + esc(ver.lastUpdated||'unknown') + '</span></div>';

    await loadMdContent(baseUrl + '/' + ver.path + '/DOC.md');
  }

  async function loadMdContent(url) {
    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      let md = await res.text();
      md = md.replace(/^---[\s\S]*?---\s*/, '');
      $modalContent.innerHTML = '<div class="doc-content">' + renderMd(md) + '</div>';
    } catch (err) {
      $modalContent.innerHTML = '<p style="color:var(--orange)">Failed to load: ' + esc(err.message) + '</p>';
    }
  }

  function closeModal() {
    $modalOverlay.classList.remove('open');
    document.body.style.overflow = '';
    currentDoc = null;
    currentLang = null;
  }

  // --- Markdown ---
  function renderMd(md) {
    let h = md;
    // Code blocks first
    h = h.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) =>
      '<pre><code class="language-' + lang + '">' + esc(code.trim()) + '</code></pre>'
    );
    // Inline code
    h = h.replace(/`([^`\n]+)`/g, '<code>$1</code>');
    // Headers
    h = h.replace(/^#{6}\s+(.+)$/gm, '<h6>$1</h6>');
    h = h.replace(/^#{5}\s+(.+)$/gm, '<h5>$1</h5>');
    h = h.replace(/^#{4}\s+(.+)$/gm, '<h4>$1</h4>');
    h = h.replace(/^#{3}\s+(.+)$/gm, '<h3>$1</h3>');
    h = h.replace(/^#{2}\s+(.+)$/gm, '<h2>$1</h2>');
    h = h.replace(/^#\s+(.+)$/gm, '<h1>$1</h1>');
    // Bold/italic
    h = h.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
    h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    h = h.replace(/\*(.+?)\*/g, '<em>$1</em>');
    // Links
    h = h.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
    // Blockquotes
    h = h.replace(/^>\s+(.+)$/gm, '<blockquote>$1</blockquote>');
    // HR
    h = h.replace(/^---+$/gm, '<hr>');
    // Lists
    h = h.replace(/^[\s]*[-*]\s+(.+)$/gm, '<li>$1</li>');
    h = h.replace(/(<li>[\s\S]*?<\/li>)/g, m => m.startsWith('<ul>') ? m : '<ul>' + m + '</ul>');
    h = h.replace(/<\/ul>\s*<ul>/g, '');
    // Paragraphs
    h = h.replace(/^(?!<[a-z/])((?!<\/)[^\n]+)$/gm, '<p>$1</p>');
    h = h.replace(/<p>\s*<\/p>/g, '');
    return h;
  }

  function showToast(msg) {
    $toast.textContent = msg;
    $toast.classList.add('show');
    setTimeout(() => $toast.classList.remove('show'), 2000);
  }

  // --- Events ---
  function setupEvents() {
    let searchTimer;
    $search.addEventListener('input', () => {
      clearTimeout(searchTimer);
      const val = $search.value.trim();
      $clearSearch.classList.toggle('visible', val.length > 0);
      searchTimer = setTimeout(() => { currentSearch = val; renderCards(); }, 120);
    });

    $clearSearch.addEventListener('click', () => {
      $search.value = '';
      $clearSearch.classList.remove('visible');
      currentSearch = '';
      renderCards();
      $search.focus();
    });

    $filters.addEventListener('click', e => {
      const btn = e.target.closest('.filter-btn');
      if (!btn) return;
      $filters.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      renderCards();
    });

    $sortSelect.addEventListener('change', () => {
      currentSort = $sortSelect.value;
      renderCards();
    });

    $groupToggle.addEventListener('click', e => {
      const btn = e.target.closest('button');
      if (!btn) return;
      $groupToggle.querySelectorAll('button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentGroup = btn.dataset.group;
      renderCards();
    });

    $main.addEventListener('click', e => {
      const card = e.target.closest('.card');
      if (!card) return;
      if (card.dataset.docId) openDocModal(card.dataset.docId);
      else if (card.dataset.skillId) openSkillModal(card.dataset.skillId);
    });

    $modalClose.addEventListener('click', closeModal);
    $modalOverlay.addEventListener('click', e => {
      if (e.target === $modalOverlay) closeModal();
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && $modalOverlay.classList.contains('open')) closeModal();
      if (e.key === '/' && !$modalOverlay.classList.contains('open') && document.activeElement !== $search) {
        e.preventDefault();
        $search.focus();
      }
    });

    $modalLangs.addEventListener('click', e => {
      const btn = e.target.closest('.lang-btn');
      if (!btn || !currentDoc) return;
      $modalLangs.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentLang = parseInt(btn.dataset.lang);
      loadDocContent(currentDoc, currentLang);
    });
  }

  // --- Boot ---
  loadRegistry();
})();
</script>
</body>
</html>
